<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Quête du Mage Noir</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap');
        
        body {
            background-color: #06050a;
            color: #d4c5a9;
            font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
            margin: 0;
            display: flex;
            justify-content: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
        }

        #game-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            padding: 16px;
            padding-bottom: 24px; 
            box-sizing: border-box;
            height: 100%;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 24px;
            font-weight: 700;
            color: #c8902a;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(200,144,42,.4);
            text-align: center;
            margin: 0 0 14px 0;
        }

        #stats-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            background: #0e0c07;
            border: 1px solid #3a2a10;
            padding: 8px 16px;
            border-radius: 2px;
            margin-bottom: 8px;
            font-family: 'Cinzel', serif;
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        .stat-val { color: #fff; font-weight: bold; }
        .c-pv { color: #e05050; }
        .c-pa { color: #70b0e0; }
        .c-pf { color: #e09050; }
        .c-or { color: #e0c050; }
        .c-exp { color: #80e080; }

        #log-container {
            flex-grow: 1;
            background: #0c0a06;
            border: 1px solid #2a1e0a;
            border-radius: 2px;
            padding: 14px 18px;
            overflow-y: auto;
            margin-bottom: 12px;
            font-size: 15px;
            line-height: 1.65;
            display: flex;
            flex-direction: column;
        }

        .log-line { margin: 2px 0; animation: fadeIn 0.15s ease-in; }
        .log-sep { color: #5a3e20; font-size: 11px; letter-spacing: 1px; }
        .log-stat { color: #a08040; font-size: 12px; font-style: italic; }
        .log-title { color: #e0a030; font-weight: bold; }
        .log-win { color: #80d080; }
        .log-hit { color: #e05050; }
        .log-miss { color: #8090a0; font-style: italic; }
        .log-crit { color: #f0d050; font-weight: bold; }

        #controls {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-height: 120px;
            max-height: 45vh;
            overflow-y: auto;
            flex-shrink: 0;
            padding-bottom: 10px;
        }

        .btn-choice {
            background: linear-gradient(135deg, #1e1408, #2a1c0a);
            border: 1px solid #7a5a2a;
            color: #e8d4a0;
            padding: 10px 18px;
            cursor: pointer;
            font-family: 'IM Fell English', serif;
            font-size: 15px;
            text-align: left;
            border-radius: 2px;
            transition: all .18s;
            width: 100%;
        }

        .btn-action {
            background: linear-gradient(135deg, #1a0808, #2a1010);
            border: 1px solid #8b2020;
            color: #f0c0a0;
            padding: 9px 14px;
            cursor: pointer;
            font-family: 'IM Fell English', serif;
            font-size: 14px;
            border-radius: 2px;
            transition: all .18s;
            text-align: left;
        }

        .btn-choice:hover, .btn-action:hover {
            border-color: #c8902a;
            color: #fff8e0;
            transform: translateX(4px);
        }

        .btn-lvl {
            background: linear-gradient(135deg, #0a1a08, #102810);
            border: 1px solid #4a8a2a;
            color: #c0f0a0;
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 14px;
            border-radius: 2px;
            transition: all .18s;
            text-align: center;
            flex: 1;
        }

        .btn-lvl:hover { border-color: #80d050; color: #e0ffc0; }

        .btn-main {
            background: linear-gradient(135deg, #2a1800, #3d2500);
            border: 2px solid #c8902a;
            color: #f8e0a0;
            padding: 12px 32px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 17px;
            letter-spacing: 2px;
            border-radius: 2px;
            margin: 20px auto;
            display: block;
        }

        .btn-main:hover {
            border-color: #f0c060; color: #fff8d0;
            box-shadow: 0 0 24px rgba(200,144,42,.4);
        }

        input[type=text] {
            background: #0e0a04;
            border: 1px solid #7a5a2a;
            color: #e8d4a0;
            padding: 9px 13px;
            font-family: 'IM Fell English', serif;
            font-size: 16px;
            border-radius: 2px;
            outline: none;
            width: 250px;
        }
        input[type=text]:focus { border-color: #c8902a; }
        .input-group { display: flex; gap: 8px; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #12100a; }
        ::-webkit-scrollbar-thumb { background: #5a3e20; border-radius: 3px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="game-container">
    <h1>LA QUÊTE DU MAGE NOIR</h1>
    <div id="stats-bar"></div>
    <div id="log-container">
        <div style="text-align:center; margin-top: 50px;">
            <p style="font-family:'IM Fell English',serif; font-style:italic; font-size:18px; color:#c0a870;">
                Votre famille a été décimée par le Mage Noir.<br>La vengeance vous attend...<br>Si vous en avez le courage.
            </p>
            <button class="btn-main" onclick="startGame()">COMMENCER</button>
        </div>
    </div>
    <div id="controls"></div>
</div>

<script>
    let s = {};
    const uiLog = document.getElementById('log-container');
    const uiControls = document.getElementById('controls');
    const uiStats = document.getElementById('stats-bar');

    function randint(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }

    function updateStats() {
        if (!s.isPlaying) { uiStats.innerHTML = ""; return; }
        let html = `
            <span>PV <b class="c-pv">${s.PV}/${s.maxPV}</b></span>
            <span>PA <b class="c-pa">${s.PA}/${s.maxPA}</b></span>
            <span>PF <b class="c-pf">${s.PF}</b></span>
            <span>Or <b class="c-or">${s.OR}</b></span>
            <span>EXP <b class="c-exp">${s.EXP}</b></span>
        `;
        if (s.inventory.mushrooms > 0) html += `<span style="color:#90d060">🍄 ${s.inventory.mushrooms}</span>`;
        if (s.inventory.poison > 0) html += `<span style="color:#a060e0">☠ ${s.inventory.poison}</span>`;
        if (s.inventory.potions > 0) html += `<span style="color:#e05050">🧪 ${s.inventory.potions}</span>`;
        
        if (s.inventory.sword.hasIt) html += `<span style="color:#888">Épée${s.inventory.sword.poisoned?"☠":""} (${s.inventory.sword.damage})${s.inventory.sword.sacred?"✨":""}</span>`;
        if (s.inventory.axe.hasIt) html += `<span style="color:#888">Hache${s.inventory.axe.poisoned?"☠":""} (${s.inventory.axe.damage})</span>`;
        if (s.inventory.dagger.hasIt) html += `<span style="color:#888">Dague${s.inventory.dagger.magicRegen?"✨":s.inventory.dagger.poisoned?"☠":""} (${s.inventory.dagger.damage})</span>`;
        if (s.inventory.armor.hasIt && s.inventory.armor.bonus > s.equippedArmorBonus) html += `<span style="color:#888">Armure (Non équipée)</span>`;
        if (s.hasBache) html += `<span style="color:#a07050">🧢 Bâche</span>`;
        if (s.inventory.onguent) html += `<span style="color:#4a8a2a">🌿 Onguent</span>`;
        
        uiStats.innerHTML = html;
    }

    function printLine(text) {
        if (text === "") {
            uiLog.appendChild(document.createElement('br'));
            return;
        }
        const div = document.createElement('div');
        div.className = "log-line";
        if (text.startsWith("────")) div.classList.add("log-sep");
        else if (text.startsWith("[ PV") || text.startsWith("[ EXP")) div.classList.add("log-stat");
        else if (text.startsWith("⚔")) div.classList.add("log-title");
        else if (text.includes("coup critique")) div.classList.add("log-crit");
        else if (text.includes("Félicitations") || text.includes("vaincu l'adversité")) div.classList.add("log-win");
        else if (text.includes("raté") || text.includes("esquivé in extremis")) div.classList.add("log-miss");
        else if (text.includes("vous a porté") || text.includes("succombez") || text.includes("douleur") || text.includes("griffes") || text.includes("s'enfoncent")) div.classList.add("log-hit");
        
        div.innerHTML = text;
        uiLog.appendChild(div);
        uiLog.scrollTop = uiLog.scrollHeight;
    }

    function addLines(lines) { lines.forEach(printLine); updateStats(); }
    function clearControls() { uiControls.innerHTML = ""; }

    function addChoice(label, onClick, styleClass = "btn-choice") {
        const btn = document.createElement('button');
        btn.className = styleClass;
        btn.innerHTML = (styleClass === "btn-choice" ? "▸ " : "› ") + label;
        btn.onclick = () => { clearControls(); onClick(); };
        uiControls.appendChild(btn);
    }

    function startGame() {
        s = {
            isPlaying: true, PV: 20, maxPV: 20, PA: 10, maxPA: 10, PF: 3, EXP: 0, OR: 5,
            lieu: 1, b: 0, g: 1, dunes: 2, corde: true, hasBache: false,
            equippedArmorBonus: 0,
            inventory: {
                sword: { damage: 2, poisoned: false, hasIt: true, sacred: false },
                axe: { damage: 0, poisoned: false, hasIt: false },
                dagger: { damage: 0, poisoned: false, magicRegen: false, hasIt: false },
                armor: { bonus: 0, hasIt: false },
                mushrooms: 0, poison: 0, potions: 0, goldenFeather: false, onguent: false
            },
            ville: {
                jour: 1, fatigue: 0, areneVictoires: 0, missionsCompletes: 0,
                brasDeFerGagne: false, brasDeFerAujourdhui: false,
                areneVaincus: []
            },
            combat: null
        };
        uiLog.innerHTML = "";
        
        addLines([
            "────────────────────────────────────────────────────────────────────────────────",
            "Soyez le bienvenu, jeune homme, en cet hiver glacial. Votre famille et votre clan ont été décimés par le Mage Noir.",
            "Une mission vous a été confiée : venger votre tribu en tuant cet ignoble sorcier.",
            "Au cours de votre périple, vous devrez faire des choix, affronter des monstres et résoudre des énigmes.",
            "Bon courage ... Vous en aurez besoin ...",
            "",
            "Vous avez 20 PV (points de vie), 10 PA (points d'agilité) et 3 PF (points de force).",
            "Les PV vous servent à encaisser les dégâts, les blessures, la faim et la soif.",
            "Les PA vous permettent de vous déplacer avec agilité, d'attaquer avec précision et d'esquiver avec souplesse, mais diminueront avec la fatigue.",
            "Les PF s'additionnent avec les dégâts que vous infligez.",
            "Vous disposez initialement d'une épée infligeant -2 PV de dégâts (auxquels s'ajouteront vos PF), ainsi que de 5 pièces d'or et d'une corde.",
            "",
            "Vous pourrez acquérir de nouveaux équipements et développer de nouvelles compétences au cours de cette aventure afin de devenir plus fort.",
            "Vous pourrez améliorer vos points de base grâce à l'expérience gagnée à chaque ennemi éliminé.",
            "",
            "Vous vous trouvez à l'entrée de votre village natal. Deux chemins s'offrent à vous :",
            "────────────────────────────────────────────────────────────────────────────────"
        ]);
        
        addChoice("Passer par les montagnes enneigées au Nord", () => processLieu(2));
        addChoice("Passer la forêt ténébreuse à l'Est", () => processLieu(3));
    }

    function checkLevelUp(nextAction) {
        if (s.EXP >= 6) {
            s.EXP -= 6;
            addLines(["", "Vous avez atteint le niveau supérieur d'expérience.", "Dans quel domaine voulez-vous gagner en expérience (+1 point permanent) ?"]);
            
            const wrapper = document.createElement('div');
            wrapper.style.display = "flex"; wrapper.style.gap = "8px";
            
            const btnPV = document.createElement('button'); btnPV.className = "btn-lvl"; btnPV.innerText = "+1 PV Max";
            btnPV.onclick = () => { s.maxPV += 1; s.PV += 1; addLines(["Vos PV Max augmentent de 1 !"]); clearControls(); checkLevelUp(nextAction); };
            
            const btnPA = document.createElement('button'); btnPA.className = "btn-lvl"; btnPA.innerText = "+1 PA Max";
            btnPA.onclick = () => { s.maxPA += 1; s.PA += 1; addLines(["Vos PA Max augmentent de 1 !"]); clearControls(); checkLevelUp(nextAction); };
            
            const btnPF = document.createElement('button'); btnPF.className = "btn-lvl"; btnPF.innerText = "+1 PF";
            btnPF.onclick = () => { s.PF += 1; addLines(["Vos PF augmentent de 1 !"]); clearControls(); checkLevelUp(nextAction); };
            
            wrapper.appendChild(btnPV); wrapper.appendChild(btnPA); wrapper.appendChild(btnPF);
            uiControls.appendChild(wrapper);
        } else {
            nextAction();
        }
    }

    function processLieu(lieu) {
        if (s.PV <= 0 && !s.combat) return declareDefeat(null);
        checkLevelUp(() => {
            s.lieu = lieu;
            if (lieu === 2) montagne();
            else if (lieu === 3) foret();
            else if (lieu === 4) caverne();
            else if (lieu === 7) montagneEpuise();
            else if (lieu === 9) chasser();
            else if (lieu === 10) pecher();
            else if (lieu === 11) bandits(); 
            else if (lieu === 12) foretGauche();
            else if (lieu === 13) combatGobelin();
            else if (lieu === 14) dealChampignons();
            else if (lieu === 15) bandits();
            else if (lieu === 16) lac();
            else if (lieu === 161) eboulement();
            else if (lieu === 17) temple();
            else if (lieu === 19) transition();
            else if (lieu === 20 || lieu === 21) desert();
            else if (lieu === 22 || lieu === 23) nomade();
            else if (lieu === 24) combatNomade();
            else if (lieu === 25) echangeNomade();
            else if (lieu === 26) scorpion();
            else if (lieu === 27 || lieu === 28) oasis();
            else if (lieu === 29) tempeteSable();
            else if (lieu === 30) tempeteAbri();
            else if (lieu === 31) tempeteFuite();
            else if (lieu === 32) tempeteRocher();
            else if (lieu === 33) falaisesKeth();
            else if (lieu === 34) arriveeKairMorten();
            else if (lieu === 35) auberge();
            else if (lieu === 36) dorsDehors();
            else if (lieu === 99) menuVille();
            else if (lieu === 100) arene();
            else if (lieu === 101) combatArene("Le Gladiateur Borgne", 12, 2, 8, 1, "gladiateur");
            else if (lieu === 102) combatArene("Le Berserker Nain", 18, 3, 15, 2, "berserker");
            else if (lieu === 103) combatArene("Le Troll des Arènes", 28, 4, 30, 3, "troll");
            else if (lieu === 104) combatArene("Le Champion Maudit", 40, 5, 60, 5, "champion");
            else if (lieu === 105) combatArene("L'Hydre à Deux Têtes", 55, 6, 90, 6, "hydre");
            else if (lieu === 106) combatArene("Le Golem de Pierre", 70, 7, 130, 8, "golem");
            else if (lieu === 107) combatArene("Le Dragon Enchaîné", 90, 9, 200, 10, "dragon");
            else if (lieu === 110) marche();
            else if (lieu === 120) missions();
            else if (lieu === 130) travail();
            else if (lieu === 131) travailPorter();
            else if (lieu === 132) travailCreuser();
            else if (lieu === 133) travailGarder();
            else if (lieu === 140) taverne();
            else if (lieu === 141) jeuxDes();
            else if (lieu === 142) rumeurs();
            else if (lieu === 143) repasRoi();
            else if (lieu === 144) brasDeFer();
            else if (lieu === 150) nuit();
            else if (lieu === 200) quitterVille();
            // Nouveaux lieux - Marécages
            else if (lieu === 201) entreeMarecage();
            else if (lieu === 202) cheminPlanches();
            else if (lieu === 203) vaseEpaisse();
            else if (lieu === 204) arbrePendu();
            else if (lieu === 205) enigmeSorciere();
            else if (lieu === 206) combatSorciere();
            else if (lieu === 207) lacNoir();
            else if (lieu === 208) monstreLac();
            else if (lieu === 209) coeurPutride();
            else if (lieu === 210) autelOublie();
            else if (lieu === 211) sortieMarecage();
        });
    }

    // --- SYSTEME DE COMBAT ---
    function startCombat(name, pva, da, onWin, isArene) {
        s.combat = { name, pva, da, poison: false, armorUsed: false, onWin, isArene: isArene || false, roundExp: 0 };
        addLines(["", `⚔ COMBAT — ${name}`]);
        promptCombatAction();
    }

    function promptCombatAction() {
        updateStats();
        let c = s.combat;
        
        if (s.inventory.sword.hasIt) {
            let label = `Attaquer à l'épée${s.inventory.sword.poisoned ? " (empoisonnée)" : ""}${s.inventory.sword.sacred ? " ✨sacrée" : ""} — chance sur 12`;
            addChoice(label, () => executeAttack("sword", 12), "btn-action");
        }
        if (s.inventory.axe.hasIt) addChoice(`Attaquer à la hache${s.inventory.axe.poisoned ? " (empoisonnée)" : ""} — chance sur 16`, () => executeAttack("axe", 16), "btn-action");
        if (s.inventory.dagger.hasIt) {
            let daggerTags = []; if (s.inventory.dagger.magicRegen) daggerTags.push("Vol de vie"); if (s.inventory.dagger.poisoned) daggerTags.push("empoisonnée");
            let label = `Attaquer à la dague${daggerTags.length ? " (" + daggerTags.join(" + ") + ")" : ""} — chance sur 14`;
            addChoice(label, () => executeAttack("dagger", 14), "btn-action");
        }
        
        if (s.inventory.armor.hasIt && !c.armorUsed && s.inventory.armor.bonus > s.equippedArmorBonus) {
            let gain = s.inventory.armor.bonus - s.equippedArmorBonus;
            addChoice(`Equiper l'armure (+${gain} PV Max)`, () => {
                s.maxPV += gain;
                s.PV += gain;
                s.equippedArmorBonus = s.inventory.armor.bonus;
                c.armorUsed = true;
                addLines(["", `Armure équipée ! Vos PV Max ont augmenté de ${gain}.`]);
                enemyAttack();
            }, "btn-action");
        }
        
        if (s.inventory.mushrooms > 0) {
            addChoice(`Manger un champignon, gagne 2 PV et 1 PA (${s.inventory.mushrooms} restant(s))`, () => {
                s.PV = Math.min(s.PV + 2, s.maxPV); s.PA = Math.min(s.PA + 1, s.maxPA); s.inventory.mushrooms -= 1;
                addLines(["", "Champignon mangé."]);
                enemyAttack();
            }, "btn-action");
        }
        if (s.inventory.potions > 0) {
            addChoice(`Boire potion de soins (+8 PV)`, () => {
                s.PV = Math.min(s.PV + 8, s.maxPV); s.inventory.potions -= 1;
                addLines(["", "Vous buvez la potion et récupérez de la vitalité."]);
                enemyAttack();
            }, "btn-action");
        }
        
        if (s.inventory.poison > 0) {
            addChoice(`Empoisonner la pointe d'une arme (${s.inventory.poison} dose(s))`, () => {
                clearControls();
                if (s.inventory.sword.hasIt && !s.inventory.sword.poisoned) addChoice("Votre épée", () => { s.inventory.sword.poisoned = true; s.inventory.poison -= 1; addLines(["", "Votre épée est désormais empoisonnée."]); promptCombatAction(); }, "btn-action");
                if (s.inventory.axe.hasIt && !s.inventory.axe.poisoned) addChoice("Votre hache", () => { s.inventory.axe.poisoned = true; s.inventory.poison -= 1; addLines(["", "Votre hache est désormais empoisonnée."]); promptCombatAction(); }, "btn-action");
                if (s.inventory.dagger.hasIt && !s.inventory.dagger.poisoned) addChoice(`Votre dague${s.inventory.dagger.magicRegen ? " (gardera aussi le vol de vie)" : ""}`, () => { s.inventory.dagger.poisoned = true; s.inventory.poison -= 1; addLines(["", s.inventory.dagger.magicRegen ? "Votre dague est désormais empoisonnée. Elle drainera la vie ET empoisonnera l'ennemi !" : "Votre dague est désormais empoisonnée."]); promptCombatAction(); }, "btn-action");
                addChoice("Annuler", promptCombatAction, "btn-action");
            }, "btn-action");
        }
        
        // FUITE
        addChoice("Vous enfuir", () => {
            clearControls();
            if (c.isArene) {
                addLines(["", `Vous levez les mains en signe de capitulation. La foule siffle et vous hue.`, "Le combat s'arrête. Vous quittez l'arène sous les quolibets, mais vivant."]);
                s.combat = null;
                addChoice("Retourner à l'arène", () => processLieu(100));
                return;
            }
            const roll = randint(1, 3);
            if (roll === 1) {
                addLines(["", "Vous saisissez une fraction de seconde d'inattention de votre adversaire.", `Grâce à votre agilité foudroyante, vous vous éclipsez dans l'obscurité avant que ${c.name} ne réagisse.`, "Vous avez survécu, mais à quel prix ?", "Retenez ceci : un vrai guerrier ne fuit jamais face à l'adversité."]);
                s.combat = null;
                addChoice("Continuer votre route", () => processLieu(s.lieu));
            } else if (roll === 2) {
                s.PV -= c.da;
                addLines(["", `${c.name} vous a porté une attaque dans votre dos au moment de fuir (-${c.da} PV).`, "Vous avez survécu, mais à quel prix ?", "Retenez ceci : un vrai guerrier ne fuit jamais face à l'adversité."]);
                s.combat = null;
                if (s.PV <= 0) return declareDefeat(c.name);
                addChoice("Continuer votre route", () => processLieu(s.lieu));
            } else {
                s.PV -= 2 * c.da;
                addLines(["", `En tentant de fuir, vous trébuchez et ${c.name} en profite pour vous porter une série de coups dévastateurs (-${2 * c.da} PV).`]);
                if (s.PV <= 0) return declareDefeat(c.name);
                s.combat = null;
                addLines(["", "Vous avez survécu de justesse, mais dans un état pitoyable.", "Retenez ceci : un vrai guerrier ne fuit jamais face à l'adversité."]);
                addChoice("Continuer votre route", () => processLieu(s.lieu));
            }
        }, "btn-action");
    }

    function executeAttack(weaponKey, chance) {
        const roll = randint(1, chance);
        let w = s.inventory[weaponKey];
        if (s.PA >= roll) {
            let dmg = w.damage + s.PF;
            let isCrit = (s.PA === roll);
            if (isCrit) { addLines(["", "Vous avez porté un coup critique."]); dmg *= 2; }
            else { addLines(["", "Vous avez attaqué avec succès."]); }
            s.combat.pva -= dmg;
            addLines([`${s.combat.name} perd ${dmg} PV. (PV restants : ${Math.max(0, s.combat.pva)})`]);
            if (w.poisoned) s.combat.poison = true;
            if (w.magicRegen) {
                s.PV = Math.min(s.PV + 1, s.maxPV);
                addLines(["La dague magique absorbe l'énergie vitale ennemie : +1 PV !"]);
            }
            // Épée sacrée : bonus EXP direct à chaque coup réussi (1/3 de chance)
            if (weaponKey === "sword" && w.sacred && randint(1, 3) === 1) {
                s.EXP += 1;
                s.combat.roundExp += 1;
                addLines(["✨ L'épée sacrée pulse d'une lueur divine et vous insuffle de l'expérience !"]);
            }
        } else {
            addLines(["", "Vous avez raté votre attaque."]);
        }
        // Accumulation d'EXP cachée par round
        s.EXP += 1;
        s.combat.roundExp += 1;
        
        enemyAttack();
    }

    function enemyAttack() {
        let c = s.combat;
        if (c.poison && c.pva > 0) {
            c.pva -= 1;
            addLines([`Le poison ronge ${c.name} (-1 PV). PV restants : ${Math.max(0, c.pva)}`]);
        }
        
        if (c.pva <= 0) {
            addLines(["", "────────────────────────────────────────────────────────────────────────────────", "Félicitations, valeureux guerrier.", "Vous avez vaincu l'adversité avec force et courage."]);
            s.EXP += 1; // Bonus de victoire
            addLines([`[ Total d'expérience remportée pour ce combat : ${c.roundExp + 1} EXP ]`, "────────────────────────────────────────────────────────────────────────────────"]);
            let cb = c.onWin;
            let isArene = c.isArene;
            s.combat = null;
            if (s.PV <= 0) {
                if (isArene) return areneInfirmerie();
                return declareDefeat(null);
            }
            checkLevelUp(() => cb());
            return;
        }

        if (s.PA > randint(1, 50)) {
            addLines(["", `${c.name} vous a porté une attaque, mais vous l'avez esquivé in extremis.`]);
        } else {
            addLines(["", `${c.name} vous a porté une attaque`]);
            s.PV -= c.da;
        }
        
        if (s.PV <= 0) {
            if (c.isArene) return areneInfirmerie();
            return declareDefeat(c.name);
        }
        promptCombatAction();
    }

    function _dormir(hotel) {
        s.ville.brasDeFerAujourdhui = false;
        if (hotel) {
            s.PV = s.maxPV; s.PA = s.maxPA; s.ville.fatigue = Math.max(s.ville.fatigue - 1, 0);
        } else {
            s.PV = Math.min(s.PV + 2, s.maxPV); s.ville.fatigue += 1;
            if (s.ville.fatigue >= 3) {
                addLines(["", "Vous accumulez trop de nuits à la dure. La fatigue chronique vous ronge (-1 PA Max permanent)."]);
                s.maxPA = Math.max(s.maxPA - 1, 1);
                s.PA = Math.min(s.PA, s.maxPA);
                s.ville.fatigue = 0;
            }
        }
        s.ville.jour += 1;
        if (s.ville.jour >= 10) {
            addLines(["", `⚠ Cela fait ${s.ville.jour} jours que vous traînez à Kair Morten.`, "Des rumeurs courent dans la ville : le Mage Noir a renforcé ses armées.", "On dit qu'il est désormais presque invincible. Chaque jour perdu est une victoire pour lui."]);
        }
        addChoice("Aller en ville", () => processLieu(99));
    }

    function arene() {
        const v = s.ville.areneVictoires;
        const vaincus = s.ville.areneVaincus;
        addLines(["", "── L'ARÈNE DE KAIR MORTEN ──", "La foule rugit. L'odeur du sang et de la sueur imprègne l'air brûlant de l'arène.",
            v === 0 ? "Vous êtes encore un inconnu ici. Seuls les combattants de bas niveau vous feront face." :
            v < 4 ? "Votre réputation commence à se faire. Des adversaires plus coriaces s'avancent." :
            v < 10 ? "Vous êtes une légende de l'arène. Les monstres les plus redoutables réclament votre tête." :
            "Votre nom seul fait trembler les combattants. Seules les créatures les plus terrifiantes osent vous défier."]);

        let hasChoice = false;
        ARENE_ADVERSAIRES.forEach((adv, idx) => {
            if (idx <= v && !vaincus.includes(adv.key)) {
                addChoice(`${adv.nom} — PV:${adv.pv} DA:${adv.da} → Gain: ${adv.or} or`, () => processLieu(adv.lieu));
                hasChoice = true;
            }
        });

        if (!hasChoice) {
            addLines(["", "Vous avez vaincu tous les adversaires disponibles.", "Continuez à vous battre pour débloquer de nouveaux adversaires !"]);
            if (ARENE_ADVERSAIRES.every(a => vaincus.includes(a.key))) {
                addLines(["", "🏆 Vous avez triomphé de TOUS les champions de l'arène. Votre légende est immortelle."]);
            }
        }
        addChoice("Retourner en ville", () => processLieu(99));
    }

    function combatArene(nom, pva, da, gainOr, gainExp, key) {
        if (s.ville.areneVaincus.includes(key)) {
            addLines(["", `${nom} a déjà été vaincu et refusé de remonter sur le sable. La foule réclame du sang frais.`]);
            addChoice("Retourner à l'arène", () => processLieu(100));
            return;
        }
        addLines(["", `La foule scande votre nom alors que ${nom} entre dans l'arène en rugissant !`]);
        startCombat(nom, pva, da, () => {
            s.OR += gainOr;
            s.ville.areneVictoires += 1;
            const v = s.ville.areneVictoires;
            if (!s.ville.areneVaincus.includes(key)) s.ville.areneVaincus.push(key);
            for(let i = 0; i < gainExp - 1; i++) { s.EXP += 1; }
            addLines(["", `La foule explose de joie ! Vous avez vaincu ${nom} !`,
                `Vous empochez ${gainOr} pièces d'or. (Bonus d'EXP des arènes validé)`,
                v === 2 ? "\"Impressionnant ! De nouveaux adversaires acceptent de vous affronter.\"" :
                v === 5 ? "\"Incroyable ! Vous êtes la terreur de l'arène !\" La foule vous couvre de pièces (+10 or bonus)." :
                v === 10 ? "\"Le Golem de Pierre en personne réclame votre tête !\"" :
                v === 14 ? "\"On dit que le Dragon Enchaîné n'a jamais été vaincu. Osez-vous l'affronter ?\"" :
                `${nom} ne remontera plus jamais sur ce sable. La foule vous acclame.`]);
            if (v === 5) s.OR += 10;
            addChoice("Retourner à l'arène", () => processLieu(100));
        }, true);
    }

    function missions() {
        const mc = s.ville.missionsCompletes;
        addLines(["", "── TABLEAU DES MISSIONS ──", "Un panneau de liège couvert d'avis et de primes. Des aventuriers de tout poil l'étudient avec intérêt."]);
        if (mc < 1) addChoice("Extermination de rats géants — Récompense : 15 or", () => lancerMission(0));
        if (mc < 2) addChoice("Escorte du marchand Tolbas — Récompense : 25 or", () => lancerMission(1));
        if (mc < 3) addChoice("La Bête de la Carrière — Récompense : 50 or + armure", () => lancerMission(2));
        if (mc < 4) addChoice("Le Mage Renégat de la Vieille Tour — Récompense : 80 or + tome", () => lancerMission(3));
        if (mc >= 4) addLines(["Vous avez accompli toutes les missions disponibles. De nouvelles missions apparaîtront demain."]);
        addChoice("Retourner en ville", () => processLieu(99));
    }

    function lancerMission(idx) {
        const m = MISSIONS[idx];
        addLines([`── MISSION : ${m.titre} ──`, ...m.intro]);
        startCombat(m.ennemi[0], m.ennemi[1], m.ennemi[2], m.win);
    }

        addLines(["", "── LA ZONE DE TRAVAIL ──", "Des employeurs de toutes sortes cherchent de la main d'œuvre à Kair Morten.", "Le travail est épuisant, mais honnête. Choisissez votre activité :"]);

        addChoice("Garder la nuit aux portes de la ville — 14 or (risqué, combat possible)", () => processLieu(133));

    function jeuxDes() {
        if (s.OR < 5) { addLines(["", "Vous n'avez pas assez d'or pour jouer. Le croupier vous chasse de la table d'un geste dédaigneux."]); addChoice("Retour", () => processLieu(140)); return; }
        addLines(["", "Vous vous installez à la table des dés. Combien misez-vous ?"]);
        [5, 10, 20, 40].filter(m => m <= s.OR).forEach(m => addChoice(`Miser ${m} pièces d'or`, () => lancerDes(m)));
        addChoice("Finalement, ne pas jouer", () => processLieu(140));
    }

    function lancerDes(mise) {
        s.OR -= mise;
        const monLancer = randint(1, 6) + randint(1, 6); const adverse = randint(2, 12);
        addLines(["", `Vous lancez les dés : ${monLancer}. Votre adversaire fait : ${adverse}.`]);
        if (monLancer > adverse) { s.OR += mise * 2; addLines([`Vous gagnez ! +${mise * 2} pièces d'or.`]); }
        else if (monLancer === adverse) { s.OR += mise; addLines(["Égalité ! Vous récupérez votre mise."]); }
        else { addLines([`Vous perdez. -${mise} pièces d'or. L'adversaire ricane.`]); }
        addLines([`Or restant : ${s.OR}`]);
        addChoice("Rejouer", () => processLieu(141)); addChoice("Retour", () => processLieu(140));
    }

        if (s.OR < 3) { addLines(["", "Pas assez d'or pour offrir une tournée. Les aventuriers ne parleront pas pour rien."]); addChoice("Retour", () => processLieu(140)); return; }

            "\"Le Mage Noir se nourrit des âmes des morts. Plus vous tardez, plus il devient puissant. Chaque nuit perdue est une âme de plus pour lui.\"",

        s.OR -= 8; s.PV = Math.min(s.PV + 6, s.maxPV);

    function brasDeFer() {
        if (s.OR < 5) { addLines(["", "L'entrée coûte 5 pièces d'or. Vous n'avez pas les moyens."]); addChoice("Retour", () => processLieu(140)); return; }
        if (s.ville.brasDeFerAujourdhui) { addLines(["", "Les lutteurs refusent de vous affronter à nouveau aujourd'hui. Laissez-leur le temps de se remettre ! Revenez demain."]); addChoice("Retour", () => processLieu(140)); return; }
        
        s.OR -= 5;
        s.ville.brasDeFerAujourdhui = true; 
        const score = randint(1, 20) + s.PF;
        addLines(["", "Vous affrontez successivement plusieurs adversaires au bras de fer, sous les clameurs de la foule."]);
        
        if (score >= 18) {
            s.OR += 30;
            if (!s.ville.brasDeFerGagne) {
                s.PF += 1;
                s.ville.brasDeFerGagne = true; 
                addLines(["Vous écrasez tous vos adversaires ! La foule vous acclame.", "Prix : 30 pièces d'or. Et une réputation de colosse. +1 PF permanent !"]);
            } else {
                addLines(["Vous écrasez tous vos adversaires une fois de plus ! La foule scande votre nom.", "Prix : 30 pièces d'or. Vous confirmez votre titre de champion incontesté !"]);
            }
        }
        else if (score >= 12) { s.OR += 12; addLines(["Vous arrivez en demi-finale avant de céder face au champion en titre. 12 pièces d'or de consolation."]); }
        else { addLines(["Votre premier adversaire vous tord le bras en quelques secondes. La salle entière éclate de rire. Humiliant."]); }
        addChoice("Retour", () => processLieu(140));
    }

                "Une mâchoire monstrueuse vous attrape la jambe par surprise et vous tire vers le fond ! Vous avalez de l'eau corrompue et luttez pour remonter à la surface (-3 PV)."
            ]);
            if (s.PV <= 0) return declareDefeat("Le prédateur du Lac Noir");
            addLines(["Vous parvenez à vous débattre et à atteindre un banc de vase peu profond pour faire face à la bête !"]);
            addChoice("Affronter le monstre", () => processLieu(208));
        });
    }

    function monstreLac() {
        addLines(["", "L'eau explose et une créature gigantesque émerge : L'Hydre Fangeuse, une aberration croisée entre un serpent géant et un crocodile purulent !"]);
        startCombat("L'Hydre Fangeuse", 45, 5, () => {
            s.inventory.armor = { bonus: 12, hasIt: true };
            addLines([
                "", "La monstruosité s'affaisse en aspergeant la vase de son sang noir. Le combat a été titanesque.",
                "En découpant ses écailles épaisses, vous vous confectionnez une armure rudimentaire mais incroyablement résistante (+12 PV Max équipable).",
                "Haletant et couvert de fange, vous atteignez enfin l'autre rive du lac."
            ]);
            addChoice("S'enfoncer dans le Cœur Putride", () => processLieu(209));
        });
    }

    function coeurPutride() {
        addLines([
            "", "Vous pénétrez maintenant dans la zone la plus ancienne et corrompue des marais : le Cœur Putride.",
            "Ici, la brume verte n'est plus seulement aveuglante, elle est caustique. Les vapeurs qui s'échappent des crevasses brûlent vos yeux et votre gorge."
        ]);

        if (s.inventory.onguent) {
            addLines([
                "", "C'est le moment d'utiliser le présent de la sorcière. Vous enduisez généreusement votre visage et votre cou de l'onguent.",
                "La substance sent atrocement fort, mais la magie opère : les gaz toxiques glissent sur vous sans vous brûler les poumons.",
                "Vous traversez cette zone de mort asphyxiante totalement indemne !"
            ]);
        } else {
            s.PV -= 4;
            addLines([
                "", "Vous tentez de retenir votre respiration et de courir, mais la zone est trop vaste.",
                "Vos poumons crient au martyre. Vous êtes obligé d'inspirer, absorbant une grande rasade de gaz mortel.",
                "Vous crachez du sang et titubez à travers le brouillard. Le poison ravage vos entrailles (-4 PV)."
            ]);
        }

        if (s.PV <= 0) return declareDefeat("Les vapeurs caustiques du Cœur Putride");
        addChoice("Tituber hors du nuage toxique", () => processLieu(210));
    }

    function autelOublie() {
        addLines([
            "", "Le brouillard commence enfin à s'éclaircir. Devant vous se dresse une structure incongrue au milieu de ce chaos végétal :",
            "Un autel de pierre noire, parfaitement lisse, dédié à une divinité dont le nom a été effacé par le temps et la vase.",
            "L'autel palpite d'une étrange énergie sombre. Une inscription en langue ancienne indique qu'un sacrifice de sang accordera la vigueur nécessaire pour les épreuves à venir."
        ]);

        addChoice("Faire couler votre sang sur l'autel (-2 PV) pour un bonus de Force (+2 PF)", () => {
            s.PV -= 2; s.PF += 2;
            addLines([
                "", "Vous entaillez votre paume avec votre lame et pressez votre main contre la pierre froide.",
                "Le sang est absorbé par l'autel en un instant. Une onde de puissance brute et ténébreuse envahit vos muscles (-2 PV, +2 PF)."
            ]);
            if (s.PV <= 0) return declareDefeat("L'hémorragie rituelle");
            addChoice("Reprendre la route", () => processLieu(211));
        });
        
        addChoice("Faire couler votre sang sur l'autel (-2 PV) pour un bonus d'Agilité (+2 PA Max)", () => {
            s.PV -= 2; s.maxPA += 2; s.PA += 2;
            addLines([
                "", "Vous entaillez votre paume avec votre lame et pressez votre main contre la pierre froide.",
                "Le sang est absorbé par l'autel en un instant. Vos sens s'aiguisent de façon surnaturelle, vous vous sentez léger comme le vent (-2 PV, +2 PA Max)."
            ]);
            if (s.PV <= 0) return declareDefeat("L'hémorragie rituelle");
            addChoice("Reprendre la route", () => processLieu(211));
        });

        addChoice("Ignorer cette sorcellerie impie et poursuivre", () => {
            addLines(["", "Vous vous détournez de cet autel maudit. Votre âme vous appartient, et votre force vous vient de votre propre courage."]);
            addChoice("Reprendre la route", () => processLieu(211));
        });
    }

    function sortieMarecage() {
        addLines([
            "", "────────────────────────────────────────────────────────────────────────────────",
            "Le sol spongieux sous vos bottes laisse soudainement place à de la roche dure et coupante.",
            "La brume, comme repoussée par une force invisible, se dissipe totalement dans votre dos.",
            "Vous vous tenez au bord d'un gouffre abyssal, d'où s'élèvent des lueurs rougeoyantes.",
            "De l'autre côté du précipice, dominant un paysage de désolation volcanique, s'élève une forteresse titanesque en obsidienne pure.",
            "Des éclairs pourpres déchirent le ciel charbonneux au-dessus de la plus haute tour.",
            "",
            "Vous avez survécu aux Marécages Putrides. Le domaine du Mage Noir se dresse enfin devant vous.",
            "L'heure de la vengeance est proche.",
            "────────────────────────────────────────────────────────────────────────────────"
        ]);
        s.isPlaying = false;
        
        const btn = document.createElement('button');
        btn.className = "btn-main"; btn.innerText = "A SUIVRE - REJOUER";
        btn.onclick = startGame;
        uiControls.appendChild(btn);
    }
</script>
</body>
</html>
