<!DOCTYPE html>
<html lang="fr">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Quête du Mage Noir</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="game-container">

        </div>
    </div>
</div>
